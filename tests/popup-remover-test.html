<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>VIP解锁器 - 完整机制模拟测试</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 1000px; margin: 0 auto; }
        .test-section { margin-bottom: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
        .result { margin-top: 8px; padding: 8px; background: #f5f5f5; border-radius: 4px; font-family: monospace; white-space: pre-wrap; word-break: break-all; min-height: 20px; }
        button { padding: 8px 16px; margin: 4px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background: #0056b3; }
        #content-wrapper { border: 2px solid #333; padding: 15px; min-height: 80px; margin: 10px 0; background: #fff; }
        .sidebar a { display: block; margin: 2px; padding: 4px 8px; background: #e9ecef; text-decoration: none; color: #333; border-radius: 4px; cursor: pointer; }
        .sidebar a:hover { background: #ced4da; }
        #log { max-height: 250px; overflow-y: auto; background: #000; color: #0f0; padding: 8px; font-family: monospace; font-size: 12px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>VIP解锁器 - 完整机制模拟测试</h1>

    <div class="test-section">
        <h3>侧边栏（模拟SPA导航）</h3>
        <div class="sidebar">
            <a onclick="navigate('/vo/')">/vo/ (VIP)</a>
            <a onclick="navigate('/bpm/')">/bpm/ (VIP)</a>
            <a onclick="navigate('/mall/')">/mall/ (VIP)</a>
            <a onclick="navigate('/intro/')">/intro/ (免费)</a>
        </div>
        <button onclick="rapidClick()">快速连点3个VIP链接</button>
        <button onclick="stressTest()">连续切换8次压测</button>
        <button onclick="runAllTests()">一键运行全部测试</button>
    </div>

    <div class="test-section">
        <h3>文档内容区 (.content-wrapper)</h3>
        <div id="content-wrapper">[等待导航...]</div>
    </div>

    <div class="test-section">
        <h3>状态检查</h3>
        <div class="result" id="status-result"></div>
    </div>

    <div class="test-section">
        <h3>日志</h3>
        <div id="log"></div>
    </div>

<script>
// ============================================================
// 内存 cookie 存储（绕过 file:// 协议下 document.cookie 不可写的限制）
// 真实网站在 http(s) 协议下 document.cookie 正常工作，这里用内存等价模拟
// ============================================================
const cookieStore = {};

const Cookies = {
    get(key) { return cookieStore[key]; },
    set(key, val, opts) { cookieStore[key] = String(val); },
    remove(key) { delete cookieStore[key]; }
};
window.Cookies = Cookies;

// 模拟 jQuery $.get（内部走 XMLHttpRequest，与真实 jQuery 3.6 一致）
const $ = {
    get(url, data, cb) {
        const callback = typeof data === 'function' ? data : cb;
        const xhr = new XMLHttpRequest();
        let fullUrl = url;
        if (data && typeof data === 'object') {
            const qs = Object.keys(data).map(k => k + '=' + encodeURIComponent(data[k])).join('&');
            fullUrl += '?' + qs;
        }
        xhr.open('GET', fullUrl, true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4 && xhr.status === 200) {
                let resp = xhr.responseText;
                if (resp === 'true') resp = true;
                else if (resp === 'false') resp = false;
                callback && callback(resp);
            }
        };
        xhr.send();
    }
};
window.$ = $;

// 真实 auth 服务端：永远返回 false（假cookie必然失败）
function realAuthServer(vip, callback) {
    setTimeout(() => callback(false), 200 + Math.random() * 100);
}

const SITE_COOKIE_NAME = '88974ed8-6aff-48ab-a7d1-4af5ffea88bb';
const FAKE_AUTH_URL = 'https://svip.iocoder.cn/zsxq/auth';

const log = (msg) => {
    console.log(msg);  // puppeteer 可抓取
    const el = document.getElementById('log');
    el.innerHTML += msg + '\n';
    el.scrollTop = el.scrollHeight;
};

// 网站 d() c() m()
function d() {
    const v = Cookies.get(SITE_COOKIE_NAME);
    return v && v.length > 0;
}
function c() {
    const path = location.hash.replace('#', '') || '/vo/';
    const vipPaths = ['/bpm/', '/vo/', '/mall/', '/pay/', '/member/'];
    return vipPaths.some(p => path.indexOf(p) >= 0);
}
function m() {
    log('[网站m] 投票/续费检查 - 已结束，不弹');
}

// 网站 afterEach 钩子（核心限制逻辑，从反编译还原）
// 真实网站：内容由 VuePress SPA 渲染，afterEach 只做 VIP 检查
//   d()=true + auth通过 → 不拦截（内容已在，这里 renderContent 模拟）
//   d()=true + auth失败 → 清cookie + reload（afterEach 再跑 → d()=false → 拦截）
//   d()=false → 替换内容为"仅VIP可见" + 弹窗
function afterEach() {
    const path = location.hash.replace('#', '') || '/vo/';
    log('[网站afterEach] 导航 ' + path);
    if (!c()) { log('[网站] 非VIP路径，正常显示'); renderContent(path); return; }
    if (d()) {
        log('[网站] d()=true → 发起auth校验');
        const vip = Cookies.get(SITE_COOKIE_NAME);
        $.get(FAKE_AUTH_URL, {host: 'doc.iocoder.cn', vip: vip}, function(ok) {
            if (ok) { log('[网站] auth通过 → 内容保留（m投票检查）'); m(); renderContent(path); }
            else { log('[网站] auth失败 → 清cookie + reload'); Cookies.remove(SITE_COOKIE_NAME); setTimeout(() => afterEach(), 100); }
        });
    } else {
        log('[网站] d()=false → 替换"仅VIP可见" + 弹窗');
        document.getElementById('content-wrapper').innerHTML = '<div style="color:red;">仅 VIP 可见！</div>';
        popupShown = true;
        log('[网站] ★★★ VIP拦截发生 ★★★');
    }
}

let popupShown = false;
function renderContent(path) {
    const contents = {
        '/vo/': '<h2>VO 对象转换、数据翻译</h2><p>讲解VO对象转换...</p><pre>PageReqVO BeanUtils MapStruct</pre>',
        '/bpm/': '<h2>工作流功能开启</h2><p>工作流文档...</p><pre>BPMN 流程设计</pre>',
        '/mall/': '<h2>商城中心</h2><p>商城文档...</p><pre>商城订单</pre>',
        '/intro/': '<h2>简介</h2><p>免费文档...</p>'
    };
    document.getElementById('content-wrapper').innerHTML = contents[path] || '<p>文档内容</p>';
    popupShown = false;
}

function navigate(path) {
    history.pushState({}, '', '#' + path);
    afterEach();
}
window.addEventListener('popstate', () => afterEach());

function checkStatus() {
    const cw = document.getElementById('content-wrapper');
    const r = {
        cookiePresent: !!Cookies.get(SITE_COOKIE_NAME),
        contentText: cw.textContent.trim().substring(0, 50),
        isVipMark: cw.textContent.includes('仅 VIP 可见'),
        popupShown: popupShown,
        currentPath: location.hash
    };
    const el = document.getElementById('status-result');
    el.innerHTML =
        `cookie存在: ${r.cookiePresent ? '✓是' : '✗否'}\n` +
        `内容: "${r.contentText}"\n` +
        `被VIP拦截: ${r.isVipMark ? '✗是(失败)' : '✓否'}\n` +
        `弹窗弹出: ${r.popupShown ? '✗是(失败)' : '✓否'}\n` +
        `当前路径: ${r.currentPath}`;
    const ok = r.cookiePresent && !r.isVipMark && !r.popupShown;
    log(ok ? '[测试] ✓ 正常' : '[测试] ✗ 拦截');
    return ok;
}

async function rapidClick() {
    log('\n=== 快速连点 /vo/→/bpm/→/mall/ ===');
    navigate('/vo/');
    await new Promise(r => setTimeout(r, 50));
    navigate('/bpm/');
    await new Promise(r => setTimeout(r, 50));
    navigate('/mall/');
    await new Promise(r => setTimeout(r, 800));
    return checkStatus();
}

async function stressTest() {
    log('\n=== 连续切换8次压测 ===');
    const paths = ['/vo/', '/bpm/', '/mall/', '/vo/', '/bpm/', '/mall/', '/vo/', '/bpm/'];
    let allOk = true;
    for (const p of paths) {
        navigate(p);
        await new Promise(r => setTimeout(r, 350));
        if (!checkStatus()) allOk = false;
    }
    log(allOk ? '=== 压测全部通过 ===' : '=== 压测存在拦截 ===');
    return allOk;
}

async function runAllTests() {
    log('\n\n########## 开始三轮测试 ##########');
    log('--- 第一轮：单页面导航 ---');
    navigate('/vo/');
    await new Promise(r => setTimeout(r, 800));
    const r1 = checkStatus();
    log('第一轮: ' + (r1 ? '✓通过' : '✗失败'));

    log('--- 第二轮：快速连点 ---');
    const r2 = await rapidClick();
    log('第二轮: ' + (r2 ? '✓通过' : '✗失败'));

    log('--- 第三轮：连续切换压测 ---');
    const r3 = await stressTest();
    log('第三轮: ' + (r3 ? '✓通过' : '✗失败'));

    const pass = r1 && r2 && r3;
    log('\n########## 最终结论 ##########');
    log(pass ? '✅✅✅ 三轮测试全部通过，方案有效 ✅✅✅' : '❌❌❌ 测试未通过 ❌❌❌');
    window.__testResult = pass;
    return pass;
}

// ============================================================
// 模拟油猴脚本（document-start 等价：在网站脚本前执行）
// ============================================================
function injectUserscript() {
    const VIP_COOKIE_NAME = '88974ed8-6aff-48ab-a7d1-4af5ffea88bb';
    const VIP_COOKIE_VALUE = 'vip-unlocked';

    // 第一层：注入cookie（用内存Cookies，真实环境用document.cookie）
    Cookies.set(VIP_COOKIE_NAME, VIP_COOKIE_VALUE);
    log('[脚本] VIP cookie 已注入');

    // 第二层：拦截 XMLHttpRequest（核心，与真实脚本一致）
    const origOpen = XMLHttpRequest.prototype.open;
    const origSend = XMLHttpRequest.prototype.send;
    XMLHttpRequest.prototype.open = function(method, url) {
        this.__unLockerUrl = String(url || '');
        this.__unLockerFaked = false;  // 防止重复伪造响应
        return origOpen.apply(this, arguments);
    };
    XMLHttpRequest.prototype.send = function(body) {
        const url = this.__unLockerUrl || '';
        const isAuthCheck = url.indexOf('/zsxq/auth') >= 0 && url.indexOf('/zsxq/auth-') < 0;
        if (isAuthCheck && !this.__unLockerFaked) {
            this.__unLockerFaked = true;
            log('[脚本] 已拦截 auth 校验: ' + url.substring(0, 50));
            const xhr = this;
            setTimeout(() => {
                Object.defineProperty(xhr, 'readyState', {value: 4, writable: true, configurable: true});
                Object.defineProperty(xhr, 'status', {value: 200, writable: true, configurable: true});
                Object.defineProperty(xhr, 'statusText', {value: 'OK', writable: true, configurable: true});
                Object.defineProperty(xhr, 'responseText', {value: 'true', writable: true, configurable: true});
                Object.defineProperty(xhr, 'response', {value: 'true', writable: true, configurable: true});
                // 只用 onreadystatechange 触发一次（jQuery 3.6 监听 readystatechange）
                if (typeof xhr.onreadystatechange === 'function') xhr.onreadystatechange();
                else xhr.dispatchEvent(new Event('readystatechange'));
            }, 0);
            return;
        }
        return origSend.apply(this, arguments);
    };
    log('[脚本] XMLHttpRequest 劫持完成');

    // 第三层：Cookies.remove 保护
    const origRemove = Cookies.remove.bind(Cookies);
    Cookies.remove = function(key) {
        if (key === VIP_COOKIE_NAME) {
            log('[脚本] 已阻止清除 VIP cookie');
            Cookies.set(VIP_COOKIE_NAME, VIP_COOKIE_VALUE);
            return;
        }
        return origRemove(key);
    };
    log('[脚本] Cookies.remove 保护完成');
}

// 启动：先注入脚本，再标记就绪
injectUserscript();
log('=== 测试环境就绪 ===\n');
window.__ready = true;
</script>
</body>
</html>
