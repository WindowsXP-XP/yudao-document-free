<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP解锁器测试页面</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .test-section {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .test-section h3 {
            margin-top: 0;
            color: #333;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button:hover {
            background: #0056b3;
        }
        .result {
            margin-top: 10px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 4px;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <h1>VIP解锁器测试页面</h1>

    <div class="test-section">
        <h3>测试1: 检查 VIP cookie 是否注入</h3>
        <button onclick="checkCookieInjected()">检查 cookie</button>
        <div class="result" id="test1-result">点击按钮检查 88974ed8-... cookie 是否存在（需在油猴环境中运行）</div>
    </div>

    <div class="test-section">
        <h3>测试2: 模拟注入 cookie</h3>
        <button onclick="simulateInject()">模拟脚本注入 cookie</button>
        <div class="result" id="test2-result">点击按钮模拟脚本行为，写入 VIP cookie</div>
    </div>

    <div class="test-section">
        <h3>测试3: 验证解锁效果（跳转真实页面）</h3>
        <button onclick="window.open('https://doc.iocoder.cn/vo/', '_blank')">访问 /vo/ 文档</button>
        <button onclick="window.open('https://doc.iocoder.cn/bpm/', '_blank')">访问 /bpm/ 文档</button>
        <div class="result" id="test3-result">点击按钮在真实站点验证解锁效果：应看到完整文档内容，而非"仅 VIP 可见！"</div>
    </div>

    <div class="test-section">
        <h3>测试4: 查看 cookie 详情</h3>
        <button onclick="showCookies()">查看所有 cookie</button>
        <div class="result" id="test4-result">显示当前域所有 cookie</div>
    </div>

    <script>
        const COOKIE_NAME = '88974ed8-6aff-48ab-a7d1-4af5ffea88bb';

        // 测试1：检查 cookie 是否被油猴脚本注入
        function checkCookieInjected() {
            const cookies = document.cookie;
            const injected = cookies.includes(COOKIE_NAME);
            document.getElementById('test1-result').textContent =
                injected
                    ? '[PASS] VIP cookie 已存在（油猴脚本生效）：\n' + cookies
                    : '[FAIL] 未检测到 VIP cookie（需在油猴环境运行本测试页或脚本未生效）';
        }

        // 测试2：模拟脚本注入逻辑
        function simulateInject() {
            const maxAge = 365 * 24 * 60 * 60;
            document.cookie = COOKIE_NAME + '=vip-unlocked; max-age=' + maxAge + '; path=/';
            const ok = document.cookie.includes(COOKIE_NAME);
            document.getElementById('test2-result').textContent =
                ok
                    ? '[PASS] 模拟注入成功，cookie 已写入'
                    : '[FAIL] 模拟注入失败';
        }

        // 测试4：查看所有 cookie
        function showCookies() {
            const cookies = document.cookie || '(无 cookie)';
            document.getElementById('test4-result').textContent = cookies;
        }
    </script>
</body>
</html>
